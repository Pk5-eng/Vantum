[build]
buildCommand = "npm install && npm run build -w @vantum/shared && npm run build -w @vantum/backend && npm run build -w @vantum/frontend"

[deploy]
startCommand = "npm run start -w @vantum/backend"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
